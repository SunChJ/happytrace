<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HappyTrace</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11172a;
      --panel-2: #0f1526;
      --muted: #8b97b3;
      --text: #e8ecf7;
      --line: #24304b;
      --accent: #6ea8fe;
      --green: #3ddc97;
      --yellow: #ffd166;
      --red: #ff6b6b;
      --purple: #c792ea;
      --cyan: #5edfff;
      --orange: #ff9f43;
      --shadow: 0 12px 40px rgba(0,0,0,.3);
      --radius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: linear-gradient(180deg, #0a0f1f 0%, #0d1326 100%);
      color: var(--text);
    }
    .app { height: 100vh; display: grid; grid-template-rows: 72px 1fr 34px; gap: 12px; padding: 12px; }
    .topbar, .statusbar, .panel { background: rgba(17, 23, 42, .92); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); backdrop-filter: blur(8px); }
    .topbar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; overflow: hidden; }
    .brand { font-weight: 700; letter-spacing: .2px; white-space: nowrap; }
    .hint { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .grow { flex: 1; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input, select, button {
      background: #0d1427; color: var(--text); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; font: inherit;
    }
    input[type="file"] { padding: 6px; max-width: 240px; }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }
    .layout { min-height: 0; display: grid; grid-template-columns: 340px 1fr; gap: 12px; }
    .sidebar { min-height: 0; display: grid; grid-template-rows: minmax(240px, 1fr) minmax(150px, auto) minmax(100px, auto); gap: 12px; }
    .main { min-height: 0; display: grid; grid-template-rows: 1fr minmax(270px, 40%); gap: 12px; }
    .panel { min-height: 0; display: flex; flex-direction: column; }
    .panel h3 { margin: 0; padding: 12px 14px; font-size: 13px; color: #b6c3df; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .panel-body { min-height: 0; overflow: auto; padding: 10px; }
    .session-item, .event-row, .agent-chip { border: 1px solid transparent; border-radius: 10px; transition: .15s ease; }
    .session-item { padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,.02); cursor: pointer; }
    .session-item:hover, .event-row:hover { border-color: #35518c; background: rgba(110,168,254,.06); }
    .session-item.active, .event-row.active { border-color: var(--accent); background: rgba(110,168,254,.12); }
    .session-title { display: flex; justify-content: space-between; gap: 8px; font-weight: 600; font-size: 13px; }
    .meta, .meta-grid { color: var(--muted); font-size: 12px; }
    .meta { margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
    .meta-grid { display: grid; grid-template-columns: 92px 1fr; gap: 8px 10px; }
    .meta-grid div:nth-child(odd) { color: #9fb0d7; }
    .agents { display: flex; gap: 8px; flex-wrap: wrap; }
    .agent-chip { padding: 6px 10px; background: rgba(255,255,255,.03); border-color: var(--line); cursor: pointer; font-size: 12px; }
    .agent-chip.active { border-color: var(--accent); color: #fff; }
    .event-list { display: flex; flex-direction: column; gap: 8px; }
    .event-row { display: grid; grid-template-columns: 54px 72px 100px 126px 94px 1fr; gap: 10px; align-items: start; padding: 10px; background: rgba(255,255,255,.02); cursor: pointer; font-size: 12px; }
    .mono { font-family: var(--mono); }
    .summary { color: #dbe5ff; }
    .badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 3px 8px; border: 1px solid transparent; width: fit-content; font-size: 11px; white-space: nowrap; }
    .t-UserPromptSubmit { color: var(--purple); border-color: rgba(199,146,234,.35); background: rgba(199,146,234,.12); }
    .t-AssistantMessage { color: #a5b4fc; border-color: rgba(165,180,252,.35); background: rgba(165,180,252,.1); }
    .t-AssistantToolCall { color: var(--yellow); border-color: rgba(255,209,102,.35); background: rgba(255,209,102,.12); }
    .t-ToolResult { color: var(--green); border-color: rgba(61,220,151,.35); background: rgba(61,220,151,.12); }
    .t-Stop { color: var(--orange); border-color: rgba(255,159,67,.35); background: rgba(255,159,67,.12); }
    .t-Unknown { color: var(--cyan); border-color: rgba(94,223,255,.35); background: rgba(94,223,255,.12); }
    .s-completed { color: var(--green); }
    .s-error { color: var(--red); }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-family: var(--mono); font-size: 12px; line-height: 1.55; background: #0b1222; border: 1px solid var(--line); border-radius: 12px; padding: 12px; max-height: 300px; overflow: auto; }
    .detail-grid { display: grid; grid-template-columns: 96px 1fr; gap: 8px 10px; margin-bottom: 12px; font-size: 13px; }
    .detail-grid div:nth-child(odd) { color: #9fb0d7; }
    .section { margin-bottom: 12px; }
    .section-title { color: #b6c3df; font-size: 12px; margin-bottom: 6px; }
    .statusbar { display: flex; align-items: center; gap: 14px; padding: 0 12px; color: var(--muted); font-size: 12px; overflow: auto; white-space: nowrap; }
    .empty { color: var(--muted); display: grid; place-items: center; height: 100%; text-align: center; padding: 24px; }
    .pill { padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); font-size: 11px; }
    .good { color: var(--green); }
    .warn { color: var(--yellow); }
    .small { font-size: 11px; color: var(--muted); }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .event-row { grid-template-columns: 48px 68px 90px 110px 88px 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="brand">HappyTrace</div>
        <div class="hint">静态 HTML，支持读取本地 Hermes / Codex / Claude / OpenCode session 日志；Chrome/Arc 可记住目录并自动刷新</div>
      </div>
      <div class="grow"></div>
      <div class="toolbar">
        <input id="searchInput" placeholder="搜索消息 / tool / output" />
        <select id="typeFilter"><option value="">全部类型</option></select>
        <select id="agentFilter"><option value="">全部 role</option></select>
        <button id="connectBtn">连接 sessions 目录</button>
        <input id="folderInput" type="file" webkitdirectory directory multiple />
        <button id="reloadBtn">重新加载</button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <section class="panel">
          <h3><span>Sessions</span><span id="sessionCount">0</span></h3>
          <div id="sessionsPanel" class="panel-body"></div>
        </section>
        <section class="panel">
          <h3><span>Session Meta</span></h3>
          <div id="metaPanel" class="panel-body"></div>
        </section>
        <section class="panel">
          <h3><span>Roles</span></h3>
          <div id="agentsPanel" class="panel-body"></div>
        </section>
      </div>

      <div class="main">
        <section class="panel">
          <h3><span>Events</span><span id="eventCount">0</span></h3>
          <div id="eventsPanel" class="panel-body"></div>
        </section>
        <section class="panel">
          <h3><span>Detail</span><span id="detailTitle">未选中</span></h3>
          <div id="detailPanel" class="panel-body"></div>
        </section>
      </div>
    </div>

    <div class="statusbar" id="statusBar"><span>ready</span></div>
  </div>

  <script>
    const DB_NAME = 'happytrace-db';
    const STORE = 'kv';
    const AUTO_REFRESH_MS = 5000;
    let autoRefreshTimer = null;
    let directoryHandle = null;

    let state = {
      data: { sessions: [] },
      activeSessionId: null,
      activeEventId: null,
      activeAgent: '',
      activeType: '',
      search: '',
      sourceMode: 'none',
      lastLoadedAt: null
    };

    const $ = (sel) => document.querySelector(sel);
    const sessionsPanel = $('#sessionsPanel');
    const metaPanel = $('#metaPanel');
    const agentsPanel = $('#agentsPanel');
    const eventsPanel = $('#eventsPanel');
    const detailPanel = $('#detailPanel');
    const detailTitle = $('#detailTitle');
    const sessionCount = $('#sessionCount');
    const eventCount = $('#eventCount');
    const typeFilter = $('#typeFilter');
    const agentFilter = $('#agentFilter');
    const statusBar = $('#statusBar');

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbSet(key, value) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(value, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    async function idbGet(key) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readonly');
        const req = tx.objectStore(STORE).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function currentSession() {
      return state.data.sessions.find(s => s.id === state.activeSessionId) || state.data.sessions[0] || null;
    }

    function visibleEvents(session) {
      if (!session) return [];
      return session.events.filter(e => {
        if (state.activeAgent && e.agent !== state.activeAgent) return false;
        if (state.activeType && e.type !== state.activeType) return false;
        if (!state.search) return true;
        const hay = [e.summary, e.tool, e.output, JSON.stringify(e.payload || {}), e.content || ''].join('\n').toLowerCase();
        return hay.includes(state.search.toLowerCase());
      });
    }

    function escapeHtml(v) {
      return String(v ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function truncate(text, n = 150) {
      const s = String(text ?? '');
      return s.length > n ? s.slice(0, n) + '…' : s;
    }

    function safeJsonParse(text) {
      try { return JSON.parse(text); } catch { return null; }
    }

    function parseJsonl(text) {
      return String(text || '').split(/\n+/).map(line => line.trim()).filter(Boolean).map(line => safeJsonParse(line)).filter(Boolean);
    }

    function guessDisplayName(session) {
      return session.display_name || session.title || session.id || 'session';
    }

    function extractToolCalls(msg) {
      const arr = msg.tool_calls || [];
      return arr.map((tc, idx) => {
        const fn = tc.function || {};
        return {
          localId: `${msg.__idx}-toolcall-${idx}`,
          tool_call_id: tc.call_id || tc.id || `${msg.__idx}-tc-${idx}`,
          name: fn.name || 'unknown_tool',
          arguments: fn.arguments || ''
        };
      });
    }

    function inferTime(session, idx, explicitTimestamp = '') {
      if (explicitTimestamp) {
        const d = new Date(explicitTimestamp);
        if (!Number.isNaN(d.getTime())) return d.toTimeString().slice(0, 8);
      }
      const start = session.session_start || session.started_at || session.last_updated || session.updated_at || '';
      if (!start) return String(idx + 1);
      const d = new Date(start);
      if (Number.isNaN(d.getTime())) return String(idx + 1);
      d.setSeconds(d.getSeconds() + idx);
      return d.toTimeString().slice(0, 8);
    }

    function summarizeCodexContentBlocks(content) {
      if (!Array.isArray(content)) return '';
      return content.map(item => item?.text || item?.content || '').filter(Boolean).join('\n\n');
    }

    function mapHermesMessagesToEvents(rawSession) {
      const messages = rawSession.messages || [];
      const events = [];
      const toolCallMap = new Map();
      let eventId = 1;

      messages.forEach((msg, idx) => {
        msg.__idx = idx;
        const role = msg.role || 'unknown';

        if (role === 'user') {
          events.push({
            id: eventId++,
            time: inferTime(rawSession, idx),
            agent: 'user',
            type: 'UserPromptSubmit',
            tool: '',
            status: 'completed',
            summary: truncate(msg.content || '[empty user message]'),
            content: msg.content || '',
            payload: msg
          });
          return;
        }

        if (role === 'assistant') {
          const toolCalls = extractToolCalls(msg);
          if (toolCalls.length) {
            toolCalls.forEach((tc) => {
              toolCallMap.set(tc.tool_call_id, tc);
              events.push({
                id: eventId++,
                time: inferTime(rawSession, idx),
                agent: 'assistant',
                type: 'AssistantToolCall',
                tool: tc.name,
                status: 'completed',
                summary: truncate(tc.arguments || `[call] ${tc.name}`),
                content: msg.content || '',
                payload: { tool_call: tc, finish_reason: msg.finish_reason, raw_message: msg }
              });
            });
          }
          if ((msg.content || '').trim()) {
            const isStop = msg.finish_reason === 'stop';
            events.push({
              id: eventId++,
              time: inferTime(rawSession, idx),
              agent: 'assistant',
              type: isStop ? 'Stop' : 'AssistantMessage',
              tool: '',
              status: 'completed',
              summary: truncate(msg.content || ''),
              content: msg.content || '',
              payload: msg,
              output: msg.reasoning || ''
            });
          }
          return;
        }

        if (role === 'tool') {
          const linked = toolCallMap.get(msg.tool_call_id || '') || {};
          const parsed = safeJsonParse(msg.content || '');
          const summary = parsed?.output ? truncate(parsed.output) : truncate(msg.content || '');
          events.push({
            id: eventId++,
            time: inferTime(rawSession, idx),
            agent: 'tool',
            type: 'ToolResult',
            tool: linked.name || 'tool',
            status: parsed?.exit_code && parsed.exit_code !== 0 ? 'error' : 'completed',
            summary,
            content: msg.content || '',
            payload: { linked_tool_call: linked, parsed, raw_message: msg },
            output: parsed?.output || msg.content || ''
          });
          return;
        }

        events.push({
          id: eventId++,
          time: inferTime(rawSession, idx),
          agent: role,
          type: 'Unknown',
          tool: '',
          status: 'completed',
          summary: truncate(msg.content || `[${role}]`),
          content: msg.content || '',
          payload: msg
        });
      });

      return events;
    }

    function mapCodexLinesToEvents(lines, rawMeta = {}) {
      const events = [];
      const toolCallMap = new Map();
      let eventId = 1;

      lines.forEach((entry, idx) => {
        const kind = entry?.type || 'unknown';
        const payload = entry?.payload || {};
        const payloadType = payload?.type || '';
        const time = inferTime(rawMeta, idx, entry.timestamp);

        if (kind === 'session_meta') {
          events.push({
            id: eventId++,
            time,
            agent: 'session',
            type: 'SessionStart',
            tool: '',
            status: 'completed',
            summary: truncate(`${payload.originator || 'codex'} @ ${payload.cwd || ''}`),
            content: '',
            payload: entry
          });
          return;
        }

        if (kind === 'turn_context') {
          events.push({
            id: eventId++,
            time,
            agent: 'context',
            type: 'ContextSnapshot',
            tool: '',
            status: 'completed',
            summary: truncate(`${payload.model || 'model?'} · ${payload.cwd || ''}`),
            content: '',
            payload: entry
          });
          return;
        }

        if (kind === 'event_msg' && payloadType === 'user_message') {
          events.push({
            id: eventId++,
            time,
            agent: 'user',
            type: 'UserPromptSubmit',
            tool: '',
            status: 'completed',
            summary: truncate(payload.message || ''),
            content: payload.message || '',
            payload: entry
          });
          return;
        }

        if (kind === 'event_msg' && payloadType === 'agent_message') {
          events.push({
            id: eventId++,
            time,
            agent: 'assistant',
            type: 'AssistantMessage',
            tool: '',
            status: 'completed',
            summary: truncate(payload.message || ''),
            content: payload.message || '',
            payload: entry
          });
          return;
        }

        if (kind === 'event_msg' && payloadType === 'agent_reasoning') {
          events.push({
            id: eventId++,
            time,
            agent: 'assistant',
            type: 'Reasoning',
            tool: '',
            status: 'completed',
            summary: truncate(payload.text || ''),
            content: payload.text || '',
            payload: entry
          });
          return;
        }

        if (kind === 'event_msg' && payloadType === 'turn_aborted') {
          events.push({
            id: eventId++,
            time,
            agent: 'session',
            type: 'TurnAborted',
            tool: '',
            status: 'error',
            summary: truncate(payload.reason || 'turn aborted'),
            content: payload.reason || '',
            payload: entry
          });
          return;
        }

        if (kind === 'event_msg' && payloadType === 'token_count') {
          events.push({
            id: eventId++,
            time,
            agent: 'metrics',
            type: 'TokenCount',
            tool: '',
            status: 'completed',
            summary: truncate(JSON.stringify(payload.info || payload.rate_limits || {})),
            content: '',
            payload: entry
          });
          return;
        }

        if (kind === 'response_item' && payloadType === 'function_call') {
          toolCallMap.set(payload.call_id, payload);
          events.push({
            id: eventId++,
            time,
            agent: 'assistant',
            type: 'AssistantToolCall',
            tool: payload.name || 'tool',
            status: 'completed',
            summary: truncate(payload.arguments || ''),
            content: payload.arguments || '',
            payload: entry
          });
          return;
        }

        if (kind === 'response_item' && payloadType === 'function_call_output') {
          const linked = toolCallMap.get(payload.call_id) || {};
          const parsed = safeJsonParse(payload.output || '');
          const summary = truncate(parsed?.output || payload.output || '');
          const exitCode = parsed?.metadata?.exit_code;
          events.push({
            id: eventId++,
            time,
            agent: 'tool',
            type: 'ToolResult',
            tool: linked.name || 'tool',
            status: exitCode && exitCode !== 0 ? 'error' : 'completed',
            summary,
            content: payload.output || '',
            payload: { entry, linked_tool_call: linked, parsed },
            output: parsed?.output || payload.output || ''
          });
          return;
        }

        if (kind === 'response_item' && payloadType === 'reasoning') {
          const summary = truncate(payload.summary?.map?.(x => x.text).filter(Boolean).join('\n\n') || 'reasoning');
          events.push({
            id: eventId++,
            time,
            agent: 'assistant',
            type: 'Reasoning',
            tool: '',
            status: 'completed',
            summary,
            content: summary,
            payload: entry
          });
          return;
        }

        if (kind === 'response_item' && payloadType === 'ghost_snapshot') {
          events.push({
            id: eventId++,
            time,
            agent: 'session',
            type: 'Snapshot',
            tool: '',
            status: 'completed',
            summary: truncate(payload.ghost_commit?.id || 'ghost snapshot'),
            content: '',
            payload: entry
          });
          return;
        }

        if (kind === 'response_item' && payloadType === 'message') {
          const role = payload.role || 'assistant';
          const content = summarizeCodexContentBlocks(payload.content);
          const mappedType = role === 'assistant' ? 'AssistantMessage' : `${role.charAt(0).toUpperCase()}${role.slice(1)}Message`;
          const mappedAgent = role === 'assistant' ? 'assistant' : role;
          events.push({
            id: eventId++,
            time,
            agent: mappedAgent,
            type: mappedType,
            tool: '',
            status: 'completed',
            summary: truncate(content || `[${role}]`),
            content,
            payload: entry
          });
          return;
        }

        events.push({
          id: eventId++,
          time,
          agent: payloadType || kind,
          type: 'Unknown',
          tool: '',
          status: 'completed',
          summary: truncate(JSON.stringify(entry)),
          content: '',
          payload: entry
        });
      });

      return events;
    }

    function normalizeHermesSession(rawSession, sessionIndex, sessionIndexMap = {}) {
      const sessionId = rawSession.session_id || rawSession.id || `hermes_session_${sessionIndex}`;
      const sessionMeta = Object.values(sessionIndexMap).find(x => x.session_id === sessionId) || {};
      const events = mapHermesMessagesToEvents(rawSession);
      const roles = Array.from(new Set(events.map(e => e.agent).filter(Boolean)));
      return {
        id: sessionId,
        title: rawSession.title || sessionMeta.display_name || sessionMeta.session_key || sessionId,
        project: rawSession.platform || sessionMeta.platform || 'unknown',
        project_path: rawSession.cwd || rawSession.project_path || '',
        runtime: 'Hermes',
        started_at: rawSession.session_start || rawSession.started_at || '',
        last_event_at: rawSession.last_updated || sessionMeta.updated_at || '',
        agents: roles,
        events,
        raw: { ...rawSession, message_count: rawSession.message_count || rawSession.messages?.length || 0 },
        index_meta: sessionMeta
      };
    }

    function normalizeClaudeContent(content) {
      if (typeof content === 'string') return [{ type: 'text', text: content }];
      if (Array.isArray(content)) return content.filter(Boolean).map(item => typeof item === 'string' ? { type: 'text', text: item } : item);
      return [];
    }

    function mapClaudeEntriesToEvents(lines, rawMeta = {}) {
      const events = [];
      const toolUseMap = new Map();
      let eventId = 1;

      lines.forEach((entry, idx) => {
        const kind = entry?.type || 'unknown';
        const time = inferTime(rawMeta, idx, entry.timestamp);

        if (kind === 'file-history-snapshot') {
          events.push({
            id: eventId++, time, agent: 'session', type: 'Snapshot', tool: '', status: 'completed',
            summary: truncate(entry.snapshot?.messageId || 'file-history-snapshot'), content: '', payload: entry
          });
          return;
        }

        if (kind === 'queue-operation') {
          events.push({
            id: eventId++, time, agent: 'session', type: entry.operation === 'enqueue' ? 'QueueEnqueue' : 'QueueDequeue', tool: '', status: 'completed',
            summary: truncate(entry.content || entry.operation || ''), content: entry.content || '', payload: entry
          });
          return;
        }

        if (kind === 'last-prompt') {
          events.push({
            id: eventId++, time, agent: 'session', type: 'LastPrompt', tool: '', status: 'completed',
            summary: truncate(entry.lastPrompt || ''), content: entry.lastPrompt || '', payload: entry
          });
          return;
        }

        if (kind === 'permission-mode') {
          events.push({
            id: eventId++, time, agent: 'session', type: 'PermissionMode', tool: '', status: 'completed',
            summary: truncate(entry.mode || entry.permissionMode || 'permission mode'), content: '', payload: entry
          });
          return;
        }

        if (kind === 'system') {
          const subtype = entry.subtype || 'system';
          const mappedType = ({
            stop_hook_summary: 'StopHookSummary',
            local_command: 'LocalCommand',
            turn_duration: 'TurnDuration',
            api_error: 'ApiError',
            compact_boundary: 'CompactBoundary'
          })[subtype] || 'SystemEvent';
          const summary = truncate(entry.content || entry.error?.error?.message || subtype);
          events.push({
            id: eventId++, time, agent: 'system', type: mappedType, tool: '', status: entry.level === 'error' ? 'error' : 'completed',
            summary, content: entry.content || '', payload: entry,
            output: entry.error ? JSON.stringify(entry.error, null, 2) : ''
          });
          return;
        }

        if (kind === 'user' || kind === 'assistant') {
          const blocks = normalizeClaudeContent(entry.message?.content);
          const role = entry.message?.role || kind;
          const agent = kind === 'assistant' ? (entry.agentId ? `assistant:${entry.agentId}` : 'assistant') : 'user';

          if (kind === 'assistant' && !blocks.length) {
            events.push({
              id: eventId++, time, agent, type: 'AssistantMessage', tool: '', status: 'completed',
              summary: truncate('[empty assistant message]'), content: '', payload: entry
            });
            return;
          }

          if (kind === 'user' && !blocks.length) {
            events.push({
              id: eventId++, time, agent, type: 'UserPromptSubmit', tool: '', status: 'completed',
              summary: truncate('[empty user message]'), content: '', payload: entry
            });
            return;
          }

          let emittedMainText = false;
          blocks.forEach((block) => {
            const blockType = block?.type || 'text';
            if (blockType === 'tool_use') {
              toolUseMap.set(block.id, block);
              events.push({
                id: eventId++, time, agent, type: 'AssistantToolCall', tool: block.name || 'tool', status: 'completed',
                summary: truncate(JSON.stringify(block.input || {})), content: JSON.stringify(block.input || {}, null, 2), payload: { entry, block }
              });
              return;
            }
            if (blockType === 'tool_result') {
              const linked = toolUseMap.get(block.tool_use_id) || {};
              const contentText = typeof block.content === 'string' ? block.content : JSON.stringify(block.content || {}, null, 2);
              events.push({
                id: eventId++, time, agent: 'tool', type: 'ToolResult', tool: linked.name || 'tool', status: block.is_error ? 'error' : 'completed',
                summary: truncate(contentText), content: contentText, payload: { entry, block, linked_tool_use: linked }, output: contentText
              });
              return;
            }
            if (blockType === 'thinking') {
              events.push({
                id: eventId++, time, agent, type: 'Reasoning', tool: '', status: 'completed',
                summary: truncate(block.thinking || ''), content: block.thinking || '', payload: { entry, block }
              });
              return;
            }
            if (blockType === 'text') {
              const textContent = block.text || '';
              const mappedType = kind === 'user' ? 'UserPromptSubmit' : 'AssistantMessage';
              if (!emittedMainText || textContent.trim()) {
                events.push({
                  id: eventId++, time, agent, type: mappedType, tool: '', status: 'completed',
                  summary: truncate(textContent || `[${role}]`), content: textContent, payload: { entry, block }
                });
                emittedMainText = true
              }
              return;
            }
            events.push({
              id: eventId++, time, agent, type: 'Unknown', tool: '', status: 'completed',
              summary: truncate(JSON.stringify(block)), content: '', payload: { entry, block }
            });
          });
          return;
        }

        events.push({
          id: eventId++, time, agent: kind, type: 'Unknown', tool: '', status: 'completed',
          summary: truncate(JSON.stringify(entry)), content: '', payload: entry
        });
      });

      return events;
    }

    function toIsoFromMs(ms) {
      if (!ms) return '';
      const d = new Date(Number(ms));
      return Number.isNaN(d.getTime()) ? '' : d.toISOString();
    }

    function mapOpenCodeExportedSessionToEvents(exported) {
      const events = [];
      let eventId = 1;
      const messages = exported.messages || [];
      for (const msg of messages) {
        const meta = msg.data || {};
        const role = meta.role || 'unknown';
        const agent = meta.agent || role;
        const time = inferTime({ session_start: toIsoFromMs(msg.time_created) }, eventId - 1, toIsoFromMs(msg.time_created));

        if (role === 'user') {
          const userTextParts = (msg.parts || []).map(p => p.data).filter(p => p && p.type === 'text').map(p => p.text || '');
          const userText = userTextParts.join('\n\n') || '[user message]';
          events.push({
            id: eventId++, time, raw_time: toIsoFromMs(msg.time_created), agent: 'user', type: 'UserPromptSubmit', tool: '', status: 'completed',
            summary: truncate(userText), content: userText, payload: msg
          });
          continue;
        }

        if (role === 'assistant') {
          for (const part of msg.parts || []) {
            const p = part.data || {};
            const pTime = inferTime({ session_start: toIsoFromMs(part.time_created) }, eventId - 1, toIsoFromMs(part.time_created));
            if (p.type === 'step-start') {
              events.push({ id: eventId++, time: pTime, raw_time: toIsoFromMs(part.time_created), agent, type: 'StepStart', tool: '', status: 'completed', summary: truncate(p.snapshot || 'step-start'), content: '', payload: { message: msg, part } });
              continue;
            }
            if (p.type === 'step-finish') {
              events.push({ id: eventId++, time: pTime, raw_time: toIsoFromMs(part.time_created), agent, type: p.reason === 'tool-calls' ? 'StepFinishToolCalls' : 'StepFinish', tool: '', status: 'completed', summary: truncate(`reason=${p.reason || '-'} · total=${p.tokens?.total ?? '-'}`), content: '', payload: { message: msg, part }, output: JSON.stringify(p.tokens || {}, null, 2) });
              continue;
            }
            if (p.type === 'text') {
              events.push({ id: eventId++, time: pTime, raw_time: toIsoFromMs(part.time_created), agent, type: 'AssistantMessage', tool: '', status: 'completed', summary: truncate(p.text || ''), content: p.text || '', payload: { message: msg, part } });
              continue;
            }
            if (p.type === 'reasoning') {
              events.push({ id: eventId++, time: pTime, raw_time: toIsoFromMs(part.time_created), agent, type: 'Reasoning', tool: '', status: 'completed', summary: truncate(p.text || '[reasoning]'), content: p.text || '', payload: { message: msg, part } });
              continue;
            }
            if (p.type === 'tool') {
              const state = p.state || {};
              const inputText = typeof state.input === 'string' ? state.input : JSON.stringify(state.input || {}, null, 2);
              const output = typeof state.output === 'string' ? state.output : JSON.stringify(state.output || {}, null, 2);
              const durationMs = state.time?.start && state.time?.end ? (state.time.end - state.time.start) : null;
              events.push({
                id: eventId++, time: pTime, raw_time: toIsoFromMs(part.time_created), agent, type: 'ToolCall', tool: p.tool || '', status: 'completed',
                summary: truncate(`${p.tool || 'tool'} · ${state.title || state.status || 'call'}`),
                content: inputText,
                payload: { message: msg, part, tool_state: state, duration_ms: durationMs },
                output: ''
              });
              events.push({
                id: eventId++, time: pTime, raw_time: toIsoFromMs(part.time_created), agent: 'tool', type: 'ToolResult', tool: p.tool || '', status: state.status === 'error' ? 'error' : 'completed',
                summary: truncate(`${p.tool || 'tool'} · ${state.status || 'completed'}${durationMs != null ? ` · ${durationMs}ms` : ''}`),
                content: inputText,
                payload: { message: msg, part, tool_state: state, duration_ms: durationMs },
                output
              });
              continue;
            }
            events.push({ id: eventId++, time: pTime, agent, type: 'Unknown', tool: '', status: 'completed', summary: truncate(JSON.stringify(p)), content: '', payload: { message: msg, part } });
          }
          continue;
        }
      }
      return events;
    }

    function mergeEventsByTime(...eventLists) {
      const merged = eventLists.flat().filter(Boolean).sort((a, b) => {
        const ta = a.sort_time || a.raw_time || a.time || '';
        const tb = b.sort_time || b.raw_time || b.time || '';
        return String(ta).localeCompare(String(tb));
      });
      return merged.map((event, idx) => ({ ...event, id: idx + 1 }));
    }

    function normalizeOpenCodeExportedSession(exported, sessionIndex = 0, llmEntries = []) {
      const sess = exported.session || {};
      const deepEvents = mapOpenCodeExportedSessionToEvents(exported).map(e => ({ ...e, sort_time: e.time }));
      const llmEvents = mapOpenCodeLogEntriesToEvents(llmEntries, {
        session_start: llmEntries[0]?.timestamp || toIsoFromMs(sess.time_created),
        last_updated: llmEntries.at(-1)?.timestamp || toIsoFromMs(sess.time_updated)
      }).map(e => ({ ...e, sort_time: e.payload?.timestamp || e.time }));
      const events = mergeEventsByTime(deepEvents, llmEvents);
      const roles = Array.from(new Set(events.map(e => e.agent).filter(Boolean)));
      return {
        id: sess.id || `opencode_export_${sessionIndex}`,
        title: sess.title || sess.id || `opencode_export_${sessionIndex}`,
        project: sess.project_id || 'opencode',
        project_path: sess.directory || '',
        runtime: 'OpenCode',
        started_at: llmEntries[0]?.timestamp || toIsoFromMs(sess.time_created),
        last_event_at: llmEntries.at(-1)?.timestamp || toIsoFromMs(sess.time_updated),
        agents: roles,
        events,
        raw: { ...exported, llm_logs: llmEntries, message_count: exported.messages?.length || 0, model: exported.messages?.find?.(m => m.data?.modelID)?.data?.modelID || llmEntries[0]?.modelID || '' },
        index_meta: { slug: sess.slug || '', source_path: llmEntries.length ? 'happytrace-export+llm-logs' : 'happytrace-export' }
      };
    }

    function mapOpenCodeLogEntriesToEvents(lines, rawMeta = {}) {
      const events = [];
      let eventId = 1;
      for (const entry of lines) {
        const time = inferTime(rawMeta, eventId - 1, entry.timestamp);
        const type = entry.type || 'unknown';
        if (type === 'request') {
          events.push({
            id: eventId++, time, agent: entry.agent || 'agent', type: 'LLMRequest', tool: entry.modelID || '', status: 'completed',
            summary: truncate(`${entry.providerID || ''} / ${entry.modelID || ''} · mode=${entry.mode || ''} · messages=${entry.messageCount || 0} · tools=${entry.toolCount || 0}`),
            content: '', payload: entry
          });
          continue;
        }
        if (type === 'first_token') {
          events.push({
            id: eventId++, time, agent: entry.agent || 'agent', type: 'FirstToken', tool: '', status: 'completed',
            summary: truncate(`ttft=${entry.ttft ?? '-'}ms`), content: '', payload: entry
          });
          continue;
        }
        if (type === 'response') {
          events.push({
            id: eventId++, time, agent: entry.agent || 'agent', type: entry.finishReason === 'tool-calls' ? 'LLMResponseToolCalls' : 'LLMResponse', tool: entry.modelID || '', status: 'completed',
            summary: truncate(`finish=${entry.finishReason || '-'} · total=${entry.tokens?.total ?? '-'} · out=${entry.tokens?.output ?? '-'} · duration=${entry.totalDuration ?? '-'}ms`),
            content: '', payload: entry,
            output: JSON.stringify(entry.tokens || {}, null, 2)
          });
          continue;
        }
        if (type === 'error') {
          events.push({
            id: eventId++, time, agent: entry.agent || 'agent', type: 'LLMError', tool: '', status: 'error',
            summary: truncate(entry.error || 'error'), content: entry.error || '', payload: entry
          });
          continue;
        }
        events.push({
          id: eventId++, time, agent: entry.agent || 'agent', type: 'Unknown', tool: '', status: 'completed',
          summary: truncate(JSON.stringify(entry)), content: '', payload: entry
        });
      }
      return events;
    }

    function normalizeOpenCodeSession(sessionID, entries, sessionMeta = {}) {
      const first = entries[0] || {};
      const last = entries.at(-1) || {};
      const events = mapOpenCodeLogEntriesToEvents(entries, { session_start: first.timestamp || '', last_updated: last.timestamp || '' });
      const roles = Array.from(new Set(events.map(e => e.agent).filter(Boolean)));
      return {
        id: sessionID,
        title: sessionMeta.title || sessionID,
        project: sessionMeta.projectID || 'opencode',
        project_path: sessionMeta.directory || '',
        runtime: 'OpenCode',
        started_at: first.timestamp || '',
        last_event_at: last.timestamp || '',
        agents: roles,
        events,
        raw: { ...sessionMeta, message_count: entries.length, lines: entries, model: first.modelID || '' },
        index_meta: { slug: sessionMeta.slug || '', source_path: 'llm-logs' }
      };
    }

    function normalizeClaudeSession(lines, sessionIndex, pathInfo = '') {
      const first = lines[0] || {};
      const firstWithSession = lines.find(x => x?.sessionId) || {};
      const sessionId = first.sessionId || firstWithSession.sessionId || `claude_session_${sessionIndex}`;
      const firstUserEntry = lines.find(x => x?.type === 'user');
      const firstUserBlocks = normalizeClaudeContent(firstUserEntry?.message?.content);
      const firstUserText = firstUserBlocks.map(b => b?.text || '').filter(Boolean).join('\n\n');
      const events = mapClaudeEntriesToEvents(lines, {
        session_start: first.timestamp || '',
        last_updated: lines.at(-1)?.timestamp || ''
      });
      const roles = Array.from(new Set(events.map(e => e.agent).filter(Boolean)));
      const runtimeSource = pathInfo.includes('/transcripts/') ? 'claude-transcript' : 'claude-project';
      return {
        id: sessionId,
        title: truncate(firstUserText, 80) || PathSafeBasename(pathInfo) || sessionId,
        project: first.entrypoint || runtimeSource,
        project_path: first.cwd || '',
        runtime: 'Claude',
        started_at: first.timestamp || '',
        last_event_at: lines.at(-1)?.timestamp || '',
        agents: roles,
        events,
        raw: { sessionId, message_count: lines.length, lines, version: first.version || '', model: first.message?.model || '' },
        index_meta: { source_path: pathInfo }
      };
    }

    function normalizeCodexSession(lines, sessionIndex, codexIndexMap = {}, pathInfo = '') {
      const metaLine = lines.find(x => x?.type === 'session_meta') || {};
      const meta = metaLine.payload || {};
      const sessionId = meta.id || `codex_session_${sessionIndex}`;
      const indexMeta = codexIndexMap[sessionId] || {};
      const turnContext = lines.find(x => x?.type === 'turn_context')?.payload || {};
      const firstUser = lines.find(x => x?.type === 'event_msg' && x?.payload?.type === 'user_message')?.payload?.message || '';
      const events = mapCodexLinesToEvents(lines, { session_start: meta.timestamp || lines[0]?.timestamp || '', last_updated: lines.at(-1)?.timestamp || '', updated_at: indexMeta.updated_at || '' });
      const roles = Array.from(new Set(events.map(e => e.agent).filter(Boolean)));
      return {
        id: sessionId,
        title: indexMeta.thread_name || truncate(firstUser, 80) || PathSafeBasename(pathInfo) || sessionId,
        project: meta.originator || meta.source || 'codex',
        project_path: meta.cwd || turnContext.cwd || '',
        runtime: 'Codex',
        started_at: meta.timestamp || lines[0]?.timestamp || '',
        last_event_at: lines.at(-1)?.timestamp || indexMeta.updated_at || '',
        agents: roles,
        events,
        raw: { ...meta, model: turnContext.model || '', message_count: lines.length, lines },
        index_meta: indexMeta
      };
    }

    function PathSafeBasename(pathText) {
      const parts = String(pathText || '').split('/').filter(Boolean);
      return parts[parts.length - 1] || '';
    }

    function sortSessions(sessions) {
      return sessions.sort((a, b) => String(b.started_at || b.last_event_at || '').localeCompare(String(a.started_at || a.last_event_at || '')));
    }

    async function collectFilesFromDirectoryHandle(handle, prefix = '') {
      const files = [];
      for await (const [name, entry] of handle.entries()) {
        const nextPath = prefix ? `${prefix}/${name}` : name;
        if (entry.kind === 'file') files.push({ name, path: nextPath, handle: entry });
        if (entry.kind === 'directory') files.push(...await collectFilesFromDirectoryHandle(entry, nextPath));
      }
      return files;
    }

    async function loadTextFromCollectedFile(fileRecord) {
      if (fileRecord.handle) return await (await fileRecord.handle.getFile()).text();
      if (fileRecord.file) return await fileRecord.file.text();
      return '';
    }

    async function loadUnifiedSessions(files) {
      const sessions = [];
      let hermesIndex = {};
      const codexIndex = {};
      const opencodeSessionMeta = {};
      const opencodeLogEntries = {};
      const opencodeExportedSessions = [];

      for (const file of files) {
        if (file.name === 'sessions.json' && /(^|\/)\.hermes\//.test('/' + file.path) || file.name === 'sessions.json') {
          const parsed = safeJsonParse(await loadTextFromCollectedFile(file));
          if (parsed && typeof parsed === 'object') hermesIndex = parsed;
        }
        if (file.name === 'session_index.jsonl') {
          const lines = parseJsonl(await loadTextFromCollectedFile(file));
          for (const line of lines) codexIndex[line.id] = line;
        }
        if (file.path.includes('/storage/session/global/') && file.name.endsWith('.json')) {
          const parsed = safeJsonParse(await loadTextFromCollectedFile(file));
          if (parsed?.id) opencodeSessionMeta[parsed.id] = parsed;
        }
        if (file.name.startsWith('opencode-session-') && file.name.endsWith('.json')) {
          const parsed = safeJsonParse(await loadTextFromCollectedFile(file));
          if (parsed?.happytrace_format === 'opencode-session-v1') opencodeExportedSessions.push(parsed);
        }
        if (file.path.includes('/llm-logs/') && file.name.endsWith('.jsonl')) {
          const lines = parseJsonl(await loadTextFromCollectedFile(file));
          for (const line of lines) {
            if (!line?.sessionID) continue;
            if (!opencodeLogEntries[line.sessionID]) opencodeLogEntries[line.sessionID] = [];
            opencodeLogEntries[line.sessionID].push(line);
          }
        }
      }

      let hermesCount = 0;
      let codexCount = 0;
      let claudeCount = 0;
      let opencodeCount = 0;
      for (const file of files) {
        if (/^session_.*\.json$/i.test(file.name) && file.name !== 'sessions.json') {
          const parsed = safeJsonParse(await loadTextFromCollectedFile(file));
          if (parsed?.messages) sessions.push(normalizeHermesSession(parsed, hermesCount++, hermesIndex));
          continue;
        }
        if (file.name.endsWith('.jsonl') && file.name !== 'session_index.jsonl' && /rollout-|sessions\//.test(file.path)) {
          const lines = parseJsonl(await loadTextFromCollectedFile(file));
          if (lines[0]?.type === 'session_meta') {
            sessions.push(normalizeCodexSession(lines, codexCount++, codexIndex, file.path));
            continue;
          }
        }
        if (file.name.endsWith('.jsonl') && (/\.claude\/transcripts\//.test('/' + file.path) || /\.claude\/projects\//.test('/' + file.path))) {
          if (file.path.includes('/subagents/')) continue;
          if (file.name === 'skill-injections.jsonl') continue;
          const lines = parseJsonl(await loadTextFromCollectedFile(file));
          if (lines[0]?.type === 'user' || lines[0]?.type === 'assistant' || lines[0]?.type === 'file-history-snapshot') {
            sessions.push(normalizeClaudeSession(lines, claudeCount++, file.path));
          }
        }
      }

      const exportedOpenCodeIDs = new Set();
      for (const exported of opencodeExportedSessions) {
        const sessionID = exported?.session?.id;
        const llmEntries = sessionID ? (opencodeLogEntries[sessionID] || []).sort((a, b) => (a.timestampMs || 0) - (b.timestampMs || 0)) : [];
        sessions.push(normalizeOpenCodeExportedSession(exported, opencodeCount++, llmEntries));
        if (sessionID) exportedOpenCodeIDs.add(sessionID);
      }
      for (const [sessionID, entries] of Object.entries(opencodeLogEntries)) {
        if (exportedOpenCodeIDs.has(sessionID)) continue;
        entries.sort((a, b) => (a.timestampMs || 0) - (b.timestampMs || 0));
        sessions.push(normalizeOpenCodeSession(sessionID, entries, opencodeSessionMeta[sessionID] || {}));
        opencodeCount++;
      }

      return { sessions: sortSessions(sessions) };
    }

    async function loadFromDirectoryHandle(handle) {
      const files = await collectFilesFromDirectoryHandle(handle);
      return await loadUnifiedSessions(files);
    }

    async function loadFromFileList(fileList) {
      const files = Array.from(fileList || []).map(file => ({
        name: file.name,
        path: file.webkitRelativePath || file.name,
        file
      }));
      return await loadUnifiedSessions(files);
    }

    async function connectDirectory() {
      if (!window.showDirectoryPicker) {
        alert('当前浏览器不支持目录连接。可改用右侧文件夹选择，或用 Chrome/Arc 打开。');
        return;
      }
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      directoryHandle = handle;
      await idbSet('sessionsDirHandle', handle);
      state.sourceMode = 'handle';
      await reloadData();
      startAutoRefresh();
    }

    async function restoreDirectoryHandle() {
      if (!window.showDirectoryPicker) return false;
      try {
        const handle = await idbGet('sessionsDirHandle');
        if (!handle) return false;
        const perm = await handle.queryPermission({ mode: 'read' });
        if (perm === 'granted') {
          directoryHandle = handle;
          state.sourceMode = 'handle';
          await reloadData();
          startAutoRefresh();
          return true;
        }
      } catch {}
      return false;
    }

    async function reloadData() {
      try {
        if (state.sourceMode === 'handle' && directoryHandle) {
          state.data = await loadFromDirectoryHandle(directoryHandle);
        }
        state.lastLoadedAt = new Date().toLocaleTimeString();
        if (!state.activeSessionId || !state.data.sessions.some(s => s.id === state.activeSessionId)) {
          state.activeSessionId = state.data.sessions[0]?.id || null;
          state.activeEventId = null;
        }
        hydrateFilters();
        render();
      } catch (err) {
        console.error(err);
        alert('加载失败：' + err.message);
      }
    }

    function startAutoRefresh() {
      clearInterval(autoRefreshTimer);
      if (state.sourceMode === 'handle' && directoryHandle) {
        autoRefreshTimer = setInterval(() => reloadData(), AUTO_REFRESH_MS);
      }
    }

    function renderSessions() {
      const sessions = state.data.sessions || [];
      sessionCount.textContent = sessions.length;
      if (!sessions.length) {
        sessionsPanel.innerHTML = '<div class="empty">还没有读到 session 日志。<br><br>推荐：把这个 HTML 用本地 server 打开，然后点「连接 sessions 目录」。<br><span class="small">可选目录：~/.hermes、~/.codex、~/.claude、~/.local/share/opencode，或它们各自的日志子目录</span></div>';
        return;
      }
      sessionsPanel.innerHTML = sessions.map(s => `
        <div class="session-item ${s.id === state.activeSessionId ? 'active' : ''}" data-session-id="${s.id}">
          <div class="session-title">
            <span>${escapeHtml(guessDisplayName(s))}</span>
            <span class="mono">${s.events?.length || 0}</span>
          </div>
          <div class="meta">
            <span>${escapeHtml(s.project || '-')}</span>
            <span>${escapeHtml(s.runtime || '-')}</span>
          </div>
          <div class="meta mono">${escapeHtml(s.started_at || '')}</div>
        </div>
      `).join('');
      [...sessionsPanel.querySelectorAll('.session-item')].forEach(el => {
        el.onclick = () => {
          state.activeSessionId = el.dataset.sessionId;
          state.activeEventId = null;
          hydrateFilters();
          render();
        };
      });
    }

    function renderMeta() {
      const s = currentSession();
      if (!s) {
        metaPanel.innerHTML = '<div class="empty">无 session</div>';
        return;
      }
      metaPanel.innerHTML = `
        <div class="meta-grid">
          <div>Runtime</div><div>${escapeHtml(s.runtime || '-')}</div>
          <div>Platform</div><div>${escapeHtml(s.project || '-')}</div>
          <div>Session</div><div class="mono">${escapeHtml(s.id || '-')}</div>
          <div>Started</div><div class="mono">${escapeHtml(s.started_at || '-')}</div>
          <div>Last Event</div><div class="mono">${escapeHtml(s.last_event_at || '-')}</div>
          <div>Events</div><div>${s.events?.length || 0}</div>
          <div>Messages</div><div>${s.raw?.message_count || s.raw?.messages?.length || 0}</div>
          <div>Model</div><div>${escapeHtml(s.raw?.model || '-')}</div>
          <div>Source</div><div>${escapeHtml(s.index_meta?.session_key || s.index_meta?.thread_name || s.raw?.source || '-')}</div>
        </div>
      `;
    }

    function renderAgents() {
      const s = currentSession();
      if (!s) {
        agentsPanel.innerHTML = '<div class="empty">无 role</div>';
        return;
      }
      const agents = Array.from(new Set((s.agents || []).concat((s.events || []).map(e => e.agent).filter(Boolean))));
      agentsPanel.innerHTML = `<div class="agents">${agents.map(a => `<div class="agent-chip ${state.activeAgent === a ? 'active' : ''}" data-agent="${escapeHtml(a)}">${escapeHtml(a)}</div>`).join('')}</div>`;
      [...agentsPanel.querySelectorAll('.agent-chip')].forEach(el => {
        el.onclick = () => {
          state.activeAgent = state.activeAgent === el.dataset.agent ? '' : el.dataset.agent;
          agentFilter.value = state.activeAgent;
          state.activeEventId = null;
          render();
        };
      });
    }

    function renderEvents() {
      const s = currentSession();
      const events = visibleEvents(s);
      eventCount.textContent = events.length;
      if (!events.length) {
        eventsPanel.innerHTML = '<div class="empty">当前筛选下没有事件</div>';
        detailPanel.innerHTML = '<div class="empty">选一条事件看 detail</div>';
        detailTitle.textContent = '未选中';
        return;
      }
      if (!events.some(e => String(e.id) === String(state.activeEventId))) state.activeEventId = events[0].id;
      eventsPanel.innerHTML = `<div class="event-list">${events.map(e => `
        <div class="event-row ${String(e.id) === String(state.activeEventId) ? 'active' : ''}" data-event-id="${e.id}">
          <div class="mono">#${e.id}</div>
          <div class="mono">${escapeHtml(e.time || '')}</div>
          <div>${escapeHtml(e.agent || '-')}</div>
          <div><span class="badge t-${escapeHtml(e.type || 'Unknown')}">${escapeHtml(e.type || '-')}</span></div>
          <div class="mono ${e.status === 'error' ? 's-error' : 's-completed'}">${escapeHtml(e.tool || e.status || '-')}</div>
          <div class="summary">${escapeHtml(e.summary || '')}</div>
        </div>
      `).join('')}</div>`;
      [...eventsPanel.querySelectorAll('.event-row')].forEach(el => {
        el.onclick = () => {
          state.activeEventId = el.dataset.eventId;
          renderDetail();
          renderStatus();
          [...eventsPanel.querySelectorAll('.event-row')].forEach(x => x.classList.remove('active'));
          el.classList.add('active');
        };
      });
      renderDetail();
    }

    function renderDetail() {
      const s = currentSession();
      const e = (s?.events || []).find(x => String(x.id) === String(state.activeEventId));
      if (!e) {
        detailPanel.innerHTML = '<div class="empty">选一条事件看 detail</div>';
        detailTitle.textContent = '未选中';
        return;
      }
      detailTitle.textContent = `${e.type || 'Event'} #${e.id}`;
      detailPanel.innerHTML = `
        <div class="detail-grid">
          <div>Agent</div><div>${escapeHtml(e.agent || '-')}</div>
          <div>Type</div><div>${escapeHtml(e.type || '-')}</div>
          <div>Tool</div><div class="mono">${escapeHtml(e.tool || '-')}</div>
          <div>Time</div><div class="mono">${escapeHtml(e.time || '-')}</div>
          <div>Status</div><div class="${e.status === 'error' ? 's-error' : 's-completed'}">${escapeHtml(e.status || '-')}</div>
          <div>Summary</div><div>${escapeHtml(e.summary || '-')}</div>
        </div>
        ${e.content ? `<div class="section"><div class="section-title">Content / Input</div><pre>${escapeHtml(e.content)}</pre></div>` : ''}
        ${e.output ? `<div class="section"><div class="section-title">Output / Reasoning</div><pre>${escapeHtml(e.output)}</pre></div>` : ''}
        ${e.payload ? `<div class="section"><div class="section-title">Payload</div><pre>${escapeHtml(JSON.stringify(e.payload, null, 2))}</pre></div>` : ''}
      `;
    }

    function hydrateFilters() {
      const s = currentSession();
      const types = Array.from(new Set((s?.events || []).map(e => e.type).filter(Boolean)));
      const agents = Array.from(new Set((s?.events || []).map(e => e.agent).filter(Boolean)));
      typeFilter.innerHTML = '<option value="">全部类型</option>' + types.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
      agentFilter.innerHTML = '<option value="">全部 role</option>' + agents.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');
      typeFilter.value = state.activeType;
      agentFilter.value = state.activeAgent;
    }

    function renderStatus() {
      const s = currentSession();
      const events = visibleEvents(s);
      const selected = events.find(e => String(e.id) === String(state.activeEventId));
      statusBar.innerHTML = `
        <span>source: ${escapeHtml(state.sourceMode)}</span>
        <span>sessions: ${state.data.sessions.length}</span>
        <span>session: ${escapeHtml(s?.id || '-')}</span>
        <span>events: ${events.length}/${s?.events?.length || 0}</span>
        <span>role: ${escapeHtml(state.activeAgent || 'all')}</span>
        <span>type: ${escapeHtml(state.activeType || 'all')}</span>
        <span>search: ${escapeHtml(state.search || 'off')}</span>
        <span>selected: ${selected ? '#' + selected.id : '-'}</span>
        <span>last_loaded: ${escapeHtml(state.lastLoadedAt || '-')}</span>
        <span>${state.sourceMode === 'handle' ? 'auto_refresh: on' : 'auto_refresh: off'}</span>
      `;
    }

    function render() {
      renderSessions();
      renderMeta();
      renderAgents();
      renderEvents();
      renderStatus();
    }

    $('#searchInput').addEventListener('input', e => {
      state.search = e.target.value.trim();
      state.activeEventId = null;
      render();
    });
    typeFilter.addEventListener('change', e => {
      state.activeType = e.target.value;
      state.activeEventId = null;
      render();
    });
    agentFilter.addEventListener('change', e => {
      state.activeAgent = e.target.value;
      state.activeEventId = null;
      render();
    });

    $('#connectBtn').addEventListener('click', async () => {
      try { await connectDirectory(); }
      catch (err) { console.error(err); }
    });

    $('#folderInput').addEventListener('change', async e => {
      try {
        state.data = await loadFromFileList(e.target.files);
        state.sourceMode = 'filelist';
        state.lastLoadedAt = new Date().toLocaleTimeString();
        state.activeSessionId = state.data.sessions[0]?.id || null;
        state.activeEventId = null;
        hydrateFilters();
        render();
      } catch (err) {
        console.error(err);
        alert('目录文件读取失败：' + err.message);
      }
    });

    $('#reloadBtn').addEventListener('click', async () => {
      if (state.sourceMode === 'handle' && directoryHandle) await reloadData();
    });

    (async function init() {
      render();
      await restoreDirectoryHandle();
    })();
  </script>
</body>
</html>
