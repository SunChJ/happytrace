<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Observer</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11172a;
      --panel-2: #0f1526;
      --muted: #8b97b3;
      --text: #e8ecf7;
      --line: #24304b;
      --accent: #6ea8fe;
      --green: #3ddc97;
      --yellow: #ffd166;
      --red: #ff6b6b;
      --purple: #c792ea;
      --cyan: #5edfff;
      --orange: #ff9f43;
      --shadow: 0 12px 40px rgba(0,0,0,.3);
      --radius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: linear-gradient(180deg, #0a0f1f 0%, #0d1326 100%);
      color: var(--text);
    }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 62px 1fr 32px;
      gap: 12px;
      padding: 12px;
    }
    .topbar, .statusbar, .panel {
      background: rgba(17, 23, 42, .92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      overflow: hidden;
    }
    .brand { font-weight: 700; letter-spacing: .2px; white-space: nowrap; }
    .hint { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .grow { flex: 1; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
    input, select, button, textarea {
      background: #0d1427;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
    }
    input[type="file"] { padding: 6px; max-width: 260px; }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }
    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
    }
    .sidebar {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(220px, 1fr) minmax(120px, auto) minmax(120px, auto);
      gap: 12px;
    }
    .main {
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr minmax(240px, 36%);
      gap: 12px;
    }
    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .panel h3 {
      margin: 0;
      padding: 12px 14px;
      font-size: 13px;
      color: #b6c3df;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-body {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }
    .session-item, .event-row, .agent-chip {
      border: 1px solid transparent;
      border-radius: 10px;
      transition: .15s ease;
    }
    .session-item {
      padding: 10px;
      margin-bottom: 8px;
      background: rgba(255,255,255,.02);
      cursor: pointer;
    }
    .session-item:hover, .event-row:hover { border-color: #35518c; background: rgba(110,168,254,.06); }
    .session-item.active, .event-row.active { border-color: var(--accent); background: rgba(110,168,254,.12); }
    .session-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 600;
      font-size: 13px;
    }
    .meta, .meta-grid {
      color: var(--muted);
      font-size: 12px;
    }
    .meta { margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
    .meta-grid {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px 10px;
    }
    .meta-grid div:nth-child(odd) { color: #9fb0d7; }
    .agents { display: flex; gap: 8px; flex-wrap: wrap; }
    .agent-chip {
      padding: 6px 10px;
      background: rgba(255,255,255,.03);
      border-color: var(--line);
      cursor: pointer;
      font-size: 12px;
    }
    .agent-chip.active { border-color: var(--accent); color: #fff; }
    .event-list { display: flex; flex-direction: column; gap: 8px; }
    .event-row {
      display: grid;
      grid-template-columns: 60px 80px 96px 120px 92px 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px;
      background: rgba(255,255,255,.02);
      cursor: pointer;
      font-size: 12px;
    }
    .mono { font-family: var(--mono); }
    .summary { color: #dbe5ff; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid transparent;
      width: fit-content;
      font-size: 11px;
      white-space: nowrap;
    }
    .t-UserPromptSubmit { color: var(--purple); border-color: rgba(199,146,234,.35); background: rgba(199,146,234,.12); }
    .t-PreToolUse { color: var(--yellow); border-color: rgba(255,209,102,.35); background: rgba(255,209,102,.12); }
    .t-PostToolUse { color: var(--green); border-color: rgba(61,220,151,.35); background: rgba(61,220,151,.12); }
    .t-SessionStart { color: var(--cyan); border-color: rgba(94,223,255,.35); background: rgba(94,223,255,.12); }
    .t-Stop { color: var(--orange); border-color: rgba(255,159,67,.35); background: rgba(255,159,67,.12); }
    .s-completed { color: var(--green); }
    .s-error { color: var(--red); }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      background: #0b1222;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      max-height: 280px;
      overflow: auto;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 8px 10px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .detail-grid div:nth-child(odd) { color: #9fb0d7; }
    .section { margin-bottom: 12px; }
    .section-title { color: #b6c3df; font-size: 12px; margin-bottom: 6px; }
    .statusbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
    }
    .empty {
      color: var(--muted);
      display: grid;
      place-items: center;
      height: 100%;
      text-align: center;
      padding: 24px;
    }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { grid-template-rows: minmax(160px, auto) minmax(120px, auto) minmax(100px, auto); }
      .event-row { grid-template-columns: 48px 70px 90px 100px 80px 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="brand">Agent Observer</div>
        <div class="hint">单文件 HTML，可导入 JSON，看 session / events / detail</div>
      </div>
      <div class="grow"></div>
      <div class="toolbar">
        <input id="searchInput" placeholder="搜索 summary / tool / output" />
        <select id="typeFilter"><option value="">全部类型</option></select>
        <select id="agentFilter"><option value="">全部 agent</option></select>
        <input id="fileInput" type="file" accept="application/json" />
        <button id="loadSampleBtn">载入示例</button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <section class="panel">
          <h3><span>Sessions</span><span id="sessionCount">0</span></h3>
          <div id="sessionsPanel" class="panel-body"></div>
        </section>
        <section class="panel">
          <h3><span>Session Meta</span></h3>
          <div id="metaPanel" class="panel-body"></div>
        </section>
        <section class="panel">
          <h3><span>Agents</span></h3>
          <div id="agentsPanel" class="panel-body"></div>
        </section>
      </div>

      <div class="main">
        <section class="panel">
          <h3><span>Events</span><span id="eventCount">0</span></h3>
          <div id="eventsPanel" class="panel-body"></div>
        </section>
        <section class="panel">
          <h3><span>Detail</span><span id="detailTitle">未选中</span></h3>
          <div id="detailPanel" class="panel-body"></div>
        </section>
      </div>
    </div>

    <div class="statusbar" id="statusBar">
      <span>ready</span>
    </div>
  </div>

  <script>
    const sampleData = {
      sessions: [
        {
          id: 'ses_019d8181',
          title: 'hermes-agent bugfix review',
          project: 'hermes-agent',
          project_path: '/Users/s/project/hermes-agent',
          runtime: 'Hermes',
          started_at: '2026-04-13 10:32:11',
          last_event_at: '2026-04-13 10:49:45',
          agents: ['MayDay', 'reviewer'],
          events: [
            { id: 1, time: '10:32:11', agent: 'MayDay', type: 'SessionStart', tool: '', status: 'completed', summary: 'Session started with model gpt-5.4', payload: { model: 'gpt-5.4' } },
            { id: 2, time: '10:33:02', agent: 'MayDay', type: 'UserPromptSubmit', tool: '', status: 'completed', summary: 'Fix memory sync bug and verify tests', payload: { prompt: 'Fix memory sync bug and verify tests' } },
            { id: 3, time: '10:34:10', agent: 'MayDay', type: 'PreToolUse', tool: 'read_file', status: 'completed', summary: 'Read run_agent.py around memory handling', payload: { path: 'run_agent.py', offset: 6288, limit: 30 } },
            { id: 4, time: '10:34:12', agent: 'MayDay', type: 'PostToolUse', tool: 'read_file', status: 'completed', summary: 'Found on_memory_write bridge in run_agent.py', output: 'if self._memory_manager and function_args.get("action") in ("add", "replace"):\n    self._memory_manager.on_memory_write(...)' },
            { id: 5, time: '10:36:40', agent: 'reviewer', type: 'PreToolUse', tool: 'python -m pytest', status: 'completed', summary: 'Run targeted tests', payload: { cwd: '/Users/s/project/hermes-agent', cmd: 'python -m pytest tests/test_memory.py -q' } },
            { id: 6, time: '10:38:09', agent: 'reviewer', type: 'PostToolUse', tool: 'python -m pytest', status: 'completed', summary: 'All 18 tests passed', output: '18 passed in 4.28s' },
            { id: 7, time: '10:49:45', agent: 'MayDay', type: 'Stop', tool: '', status: 'completed', summary: 'Delivered final answer with design summary', output: 'Explained how Hermes memory system is structured.' }
          ]
        },
        {
          id: 'ses_019d8201',
          title: 'agent observer prototype',
          project: 'agent-shared',
          project_path: '/Users/s/project/agent-shared',
          runtime: 'Hermes',
          started_at: '2026-04-13 14:01:20',
          last_event_at: '2026-04-13 14:18:51',
          agents: ['MayDay'],
          events: [
            { id: 1, time: '14:01:20', agent: 'MayDay', type: 'SessionStart', tool: '', status: 'completed', summary: 'Start observer design session' },
            { id: 2, time: '14:02:02', agent: 'MayDay', type: 'UserPromptSubmit', tool: '', status: 'completed', summary: 'Design a single-file html observer' },
            { id: 3, time: '14:05:22', agent: 'MayDay', type: 'PreToolUse', tool: 'write_file', status: 'completed', summary: 'Create /tmp/agent-observer.html' },
            { id: 4, time: '14:18:51', agent: 'MayDay', type: 'Stop', tool: '', status: 'completed', summary: 'Prototype ready to open in browser' }
          ]
        }
      ]
    };

    let state = {
      data: sampleData,
      activeSessionId: null,
      activeEventId: null,
      activeAgent: '',
      activeType: '',
      search: ''
    };

    const $ = sel => document.querySelector(sel);
    const sessionsPanel = $('#sessionsPanel');
    const metaPanel = $('#metaPanel');
    const agentsPanel = $('#agentsPanel');
    const eventsPanel = $('#eventsPanel');
    const detailPanel = $('#detailPanel');
    const detailTitle = $('#detailTitle');
    const sessionCount = $('#sessionCount');
    const eventCount = $('#eventCount');
    const typeFilter = $('#typeFilter');
    const agentFilter = $('#agentFilter');
    const statusBar = $('#statusBar');

    function currentSession() {
      return state.data.sessions.find(s => s.id === state.activeSessionId) || state.data.sessions[0] || null;
    }

    function visibleEvents(session) {
      if (!session) return [];
      return session.events.filter(e => {
        if (state.activeAgent && e.agent !== state.activeAgent) return false;
        if (state.activeType && e.type !== state.activeType) return false;
        if (!state.search) return true;
        const hay = [e.summary, e.tool, e.output, JSON.stringify(e.payload || {})].join('\n').toLowerCase();
        return hay.includes(state.search.toLowerCase());
      });
    }

    function renderSessions() {
      const sessions = state.data.sessions || [];
      sessionCount.textContent = sessions.length;
      if (!sessions.length) {
        sessionsPanel.innerHTML = '<div class="empty">还没有 session 数据</div>';
        return;
      }
      sessionsPanel.innerHTML = sessions.map(s => `
        <div class="session-item ${s.id === state.activeSessionId ? 'active' : ''}" data-session-id="${s.id}">
          <div class="session-title">
            <span>${escapeHtml(s.title || s.id)}</span>
            <span class="mono">${s.events?.length || 0}</span>
          </div>
          <div class="meta">
            <span>${escapeHtml(s.project || '-')}</span>
            <span>${escapeHtml(s.runtime || '-')}</span>
          </div>
          <div class="meta mono">${escapeHtml(s.started_at || '')}</div>
        </div>
      `).join('');
      [...sessionsPanel.querySelectorAll('.session-item')].forEach(el => {
        el.onclick = () => {
          state.activeSessionId = el.dataset.sessionId;
          state.activeEventId = null;
          hydrateFilters();
          render();
        };
      });
    }

    function renderMeta() {
      const s = currentSession();
      if (!s) {
        metaPanel.innerHTML = '<div class="empty">无 session</div>';
        return;
      }
      metaPanel.innerHTML = `
        <div class="meta-grid">
          <div>Runtime</div><div>${escapeHtml(s.runtime || '-')}</div>
          <div>Project</div><div>${escapeHtml(s.project || '-')}</div>
          <div>Path</div><div class="mono">${escapeHtml(s.project_path || '-')}</div>
          <div>Session</div><div class="mono">${escapeHtml(s.id || '-')}</div>
          <div>Started</div><div class="mono">${escapeHtml(s.started_at || '-')}</div>
          <div>Last Event</div><div class="mono">${escapeHtml(s.last_event_at || '-')}</div>
          <div>Events</div><div>${s.events?.length || 0}</div>
          <div>Agents</div><div>${s.agents?.length || 0}</div>
        </div>
      `;
    }

    function renderAgents() {
      const s = currentSession();
      if (!s) {
        agentsPanel.innerHTML = '<div class="empty">无 agent</div>';
        return;
      }
      const agents = Array.from(new Set((s.agents || []).concat((s.events || []).map(e => e.agent).filter(Boolean))));
      agentsPanel.innerHTML = `<div class="agents">${agents.map(a => `<div class="agent-chip ${state.activeAgent === a ? 'active' : ''}" data-agent="${escapeHtml(a)}">${escapeHtml(a)}</div>`).join('')}</div>`;
      [...agentsPanel.querySelectorAll('.agent-chip')].forEach(el => {
        el.onclick = () => {
          state.activeAgent = state.activeAgent === el.dataset.agent ? '' : el.dataset.agent;
          agentFilter.value = state.activeAgent;
          state.activeEventId = null;
          render();
        };
      });
    }

    function renderEvents() {
      const s = currentSession();
      const events = visibleEvents(s);
      eventCount.textContent = events.length;
      if (!events.length) {
        eventsPanel.innerHTML = '<div class="empty">当前筛选下没有事件</div>';
        detailPanel.innerHTML = '<div class="empty">选一条事件看 detail</div>';
        detailTitle.textContent = '未选中';
        return;
      }
      if (!events.some(e => String(e.id) === String(state.activeEventId))) {
        state.activeEventId = events[0].id;
      }
      eventsPanel.innerHTML = `<div class="event-list">${events.map(e => `
        <div class="event-row ${String(e.id) === String(state.activeEventId) ? 'active' : ''}" data-event-id="${e.id}">
          <div class="mono">#${e.id}</div>
          <div class="mono">${escapeHtml(e.time || '')}</div>
          <div>${escapeHtml(e.agent || '-')}</div>
          <div><span class="badge t-${escapeHtml(e.type || '')}">${escapeHtml(e.type || '-')}</span></div>
          <div class="mono ${e.status === 'error' ? 's-error' : 's-completed'}">${escapeHtml(e.tool || e.status || '-')}</div>
          <div class="summary">${escapeHtml(e.summary || '')}</div>
        </div>
      `).join('')}</div>`;
      [...eventsPanel.querySelectorAll('.event-row')].forEach(el => {
        el.onclick = () => {
          state.activeEventId = el.dataset.eventId;
          renderDetail();
          renderStatus();
          [...eventsPanel.querySelectorAll('.event-row')].forEach(x => x.classList.remove('active'));
          el.classList.add('active');
        };
      });
      renderDetail();
    }

    function renderDetail() {
      const s = currentSession();
      const e = (s?.events || []).find(x => String(x.id) === String(state.activeEventId));
      if (!e) {
        detailPanel.innerHTML = '<div class="empty">选一条事件看 detail</div>';
        detailTitle.textContent = '未选中';
        return;
      }
      detailTitle.textContent = `${e.type || 'Event'} #${e.id}`;
      detailPanel.innerHTML = `
        <div class="detail-grid">
          <div>Agent</div><div>${escapeHtml(e.agent || '-')}</div>
          <div>Type</div><div>${escapeHtml(e.type || '-')}</div>
          <div>Tool</div><div class="mono">${escapeHtml(e.tool || '-')}</div>
          <div>Time</div><div class="mono">${escapeHtml(e.time || '-')}</div>
          <div>Status</div><div class="${e.status === 'error' ? 's-error' : 's-completed'}">${escapeHtml(e.status || '-')}</div>
          <div>Summary</div><div>${escapeHtml(e.summary || '-')}</div>
        </div>
        ${e.payload ? `<div class="section"><div class="section-title">Payload</div><pre>${escapeHtml(JSON.stringify(e.payload, null, 2))}</pre></div>` : ''}
        ${e.output ? `<div class="section"><div class="section-title">Output</div><pre>${escapeHtml(e.output)}</pre></div>` : ''}
        <div class="section"><div class="section-title">Raw JSON</div><pre>${escapeHtml(JSON.stringify(e, null, 2))}</pre></div>
      `;
    }

    function hydrateFilters() {
      const s = currentSession();
      const types = Array.from(new Set((s?.events || []).map(e => e.type).filter(Boolean)));
      const agents = Array.from(new Set((s?.events || []).map(e => e.agent).filter(Boolean)));
      typeFilter.innerHTML = '<option value="">全部类型</option>' + types.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
      agentFilter.innerHTML = '<option value="">全部 agent</option>' + agents.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');
      typeFilter.value = state.activeType;
      agentFilter.value = state.activeAgent;
    }

    function renderStatus() {
      const s = currentSession();
      const events = visibleEvents(s);
      const selected = events.find(e => String(e.id) === String(state.activeEventId));
      statusBar.innerHTML = `
        <span>project: ${escapeHtml(s?.project || '-')}</span>
        <span>session: ${escapeHtml(s?.id || '-')}</span>
        <span>events: ${events.length}/${s?.events?.length || 0}</span>
        <span>agent: ${escapeHtml(state.activeAgent || 'all')}</span>
        <span>type: ${escapeHtml(state.activeType || 'all')}</span>
        <span>search: ${escapeHtml(state.search || 'off')}</span>
        <span>selected: ${selected ? '#' + selected.id : '-'}</span>
      `;
    }

    function render() {
      renderSessions();
      renderMeta();
      renderAgents();
      renderEvents();
      renderStatus();
    }

    function escapeHtml(v) {
      return String(v ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    $('#searchInput').addEventListener('input', e => {
      state.search = e.target.value.trim();
      state.activeEventId = null;
      render();
    });
    typeFilter.addEventListener('change', e => {
      state.activeType = e.target.value;
      state.activeEventId = null;
      render();
    });
    agentFilter.addEventListener('change', e => {
      state.activeAgent = e.target.value;
      state.activeEventId = null;
      render();
    });
    $('#loadSampleBtn').addEventListener('click', () => {
      state.data = sampleData;
      state.activeSessionId = sampleData.sessions[0]?.id || null;
      state.activeEventId = null;
      state.activeAgent = '';
      state.activeType = '';
      state.search = '';
      $('#searchInput').value = '';
      hydrateFilters();
      render();
    });
    $('#fileInput').addEventListener('change', async e => {
      const file = e.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed.sessions || !Array.isArray(parsed.sessions)) {
        alert('JSON 需要是 { "sessions": [...] } 结构');
        return;
      }
      state.data = parsed;
      state.activeSessionId = parsed.sessions[0]?.id || null;
      state.activeEventId = null;
      state.activeAgent = '';
      state.activeType = '';
      state.search = '';
      $('#searchInput').value = '';
      hydrateFilters();
      render();
    });

    state.activeSessionId = sampleData.sessions[0]?.id || null;
    hydrateFilters();
    render();
  </script>
</body>
</html>
